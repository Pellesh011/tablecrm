services:
  worker:
    build: ../backend
    image: tablecrm_backend:latest
    restart: always
    command: bash -c "python3 worker.py"
    volumes:
      - ../backend:/backend
      - ../certs:/certs
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      S3_ACCESS: ${S3_ACCESS:-dummy_access}
      S3_SECRET: ${S3_SECRET:-dummy_secret}
      S3_URL: ${S3_URL:-http://dummy-s3}
      TG_TOKEN: ${TG_TOKEN:-fake_token}
      CHEQUES_TOKEN: ${CHEQUES_TOKEN:-dummy_token}
      ACCOUNT_INTERVAL: ${ACCOUNT_INTERVAL:-10}
      POSTGRES_USER: ${POSTGRES_USER:-example}
      POSTGRES_PASS: ${POSTGRES_PASS:-example}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      XDG_RUNTIME_DIR: ./tmp
      RABBITMQ_USER: ${RABBITMQ_USER:-example}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-example}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      APPLE_PASS_TYPE_ID: ${APPLE_PASS_TYPE_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_CERTIFICATE_PATH: ${APPLE_CERTIFICATE_PATH:-}
      APPLE_KEY_PATH: ${APPLE_KEY_PATH:-}
      APPLE_WWDR_PATH: ${APPLE_WWDR_PATH:-}
      APPLE_NOTIFICATION_PATH: ${APPLE_NOTIFICATION_PATH:-}
      APPLE_NOTIFICATION_KEY: ${APPLE_NOTIFICATION_KEY:-}
      PKPASS_PASSWORD: ${PKPASS_PASSWORD:-}
    networks:
      - app_network
  redis:
    image: redis:7.0-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - app_network
    depends_on:
      - loki
  backend:
    build: ../backend
    image: tablecrm_backend:latest
    restart: always
    command: bash -c "alembic upgrade head && uvicorn main:app --host=0.0.0.0 --port 9000 --log-level=info --reload"
    volumes:
      - ../backend:/backend
      - ../photos:/backend/photos
      - ../certs:/certs
    ports:
      - "9000:9000"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      S3_ACCESS: ${S3_ACCESS:-dummy_access}
      S3_SECRET: ${S3_SECRET:-dummy_secret}
      S3_URL: ${S3_URL:-http://dummy-s3}
      TG_TOKEN: ${TG_TOKEN:-fake_token}
      CHEQUES_TOKEN: ${CHEQUES_TOKEN:-dummy_token}
      ACCOUNT_INTERVAL: ${ACCOUNT_INTERVAL:-10}
      POSTGRES_USER: ${POSTGRES_USER:-example}
      POSTGRES_PASS: ${POSTGRES_PASS:-example}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      XDG_RUNTIME_DIR: ./tmp
      RABBITMQ_USER: ${RABBITMQ_USER:-example}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-example}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      GEOAPIFY_SECRET: ${GEOAPIFY_SECRET:-}
      APPLE_PASS_TYPE_ID: ${APPLE_PASS_TYPE_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_CERTIFICATE_PATH: ${APPLE_CERTIFICATE_PATH:-}
      APPLE_KEY_PATH: ${APPLE_KEY_PATH:-}
      APPLE_WWDR_PATH: ${APPLE_WWDR_PATH:-}
      APPLE_NOTIFICATION_PATH: ${APPLE_NOTIFICATION_PATH:-}
      APPLE_NOTIFICATION_KEY: ${APPLE_NOTIFICATION_KEY:-}
      PKPASS_PASSWORD: ${PKPASS_PASSWORD:-}
    networks:
      - app_network

  teleg_bot:
    image: tablecrm_backend:latest
    restart: always
    command: python3 bot.py
    volumes:
      - ../backend:/backend
      - ../photos:/backend/photos
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      TG_TOKEN: ${TG_TOKEN:-fake_token}
      CHEQUES_TOKEN: ${CHEQUES_TOKEN:-dummy_token}
      POSTGRES_USER: ${POSTGRES_USER:-example}
      POSTGRES_PASS: ${POSTGRES_PASS:-example}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      S3_ACCESS: ${S3_ACCESS:-dummy_access}
      S3_SECRET: ${S3_SECRET:-dummy_secret}
      S3_URL: ${S3_URL:-http://dummy-s3}
    networks:
      - app_network

  max_polling:
    image: tablecrm_backend:latest
    restart: always
    command: python3 -m api.chats.max.max_polling_worker
    volumes:
      - ../backend:/backend
      - ../photos:/backend/photos
    environment:
      LOG_LEVEL: debug
      APP_URL: ${APP_URL:-http://localhost:8000}
      POSTGRES_USER: ${POSTGRES_USER:-example}
      POSTGRES_PASS: ${POSTGRES_PASS:-example}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      S3_ACCESS: ${S3_ACCESS:-dummy_access}
      S3_SECRET: ${S3_SECRET:-dummy_secret}
      S3_URL: ${S3_URL:-http://dummy-s3}
    networks:
      - app_network

  telegram_polling:
    image: tablecrm_backend:latest
    restart: always
    command: python3 -m api.chats.telegram.telegram_polling_worker
    volumes:
      - ../backend:/backend
      - ../photos:/backend/photos
    environment:
      LOG_LEVEL: debug
      APP_URL: ${APP_URL:-http://localhost:8000}
      POSTGRES_USER: ${POSTGRES_USER:-example}
      POSTGRES_PASS: ${POSTGRES_PASS:-example}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      S3_ACCESS: ${S3_ACCESS:-dummy_access}
      S3_SECRET: ${S3_SECRET:-dummy_secret}
      S3_URL: ${S3_URL:-http://dummy-s3}
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - backend
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - backend
    networks:
      - app_network

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - app_network

volumes:
  grafana-data:
  prometheus-data:
  redis-data:
  loki-data:

networks:
  app_network:
    external: true
    name: app_network
